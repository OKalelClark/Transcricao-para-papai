<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Ininterrupto V7</title>
    <style>
        body { 
            background-color: #000; color: #FFFF00; 
            font-family: sans-serif; padding: 20px; margin: 0;
            padding-bottom: 300px;
        }
        #status { 
            position: fixed; top: 0; left: 0; width: 100%;
            background: #222; color: #0f0; font-size: 14px;
            padding: 10px; z-index: 1000;
        }
        #container { margin-top: 60px; }
        .frase-final { 
            font-size: 3.2rem; line-height: 1.1; 
            margin-bottom: 25px; text-transform: uppercase;
            border-left: 12px solid #FFFF00; padding-left: 15px;
        }
        #btn-limpar {
            position: fixed; bottom: 20px; right: 20px;
            width: 80px; height: 80px; background: red; 
            color: white; border: none; border-radius: 50%;
            font-weight: bold; z-index: 1001;
        }
    </style>
</head>
<body>
    <div id="status">CLIQUE PARA INICIAR</div>
    <div id="container"></div>
    <button id="btn-limpar" onclick="document.getElementById('container').innerHTML=''">LIMPAR</button>

    <script>
        const container = document.getElementById('container');
        const statusDiv = document.getElementById('status');
        
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();

        // CONFIGURAÇÃO "LIMPA"
        recognition.lang = 'pt-BR';
        recognition.continuous = false; // Mudamos para falso para evitar o efeito escada
        recognition.interimResults = false; // Só queremos o resultado final

        let appAtivo = false;

        recognition.onresult = (event) => {
            const fala = event.results[0][0].transcript;
            
            // Cria o bloco de texto apenas quando a frase termina
            const bloco = document.createElement('div');
            bloco.className = 'frase-final';
            bloco.innerText = fala.trim();
            container.appendChild(bloco);
            
            window.scrollTo(0, document.body.scrollHeight);
        };

        // REINÍCIO IMEDIATO
        recognition.onend = () => {
            if (appAtivo) {
                recognition.start();
            }
        };

        recognition.onerror = (event) => {
            if (event.error === 'no-speech') {
                // Se não houver fala, ele apenas reinicia sem avisar erro
                if (appAtivo) recognition.start();
            } else {
                statusDiv.innerText = "ERRO: " + event.error;
            }
        };

        document.body.onclick = () => {
            appAtivo = true;
            recognition.start();
            statusDiv.innerText = "● ESCUTANDO...";
        };
    </script>
</body>
</html>
